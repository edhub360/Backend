[pytest]
pythonpath = .
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    ai_chat: AI Chat Model tests
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
addopts = 
    -v 
    --strict-markers 
    --tb=short 
    