name: Tests

on:
  push:
    branches: [ feature ]
  pull_request:
    branches: [ feature ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements-test.txt') }}
        restore-keys: ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt

    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

    - name: Lint with flake8
      run: |
        flake8 quiz login flashcard ai_chat courses Notes study_planner \
          --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Format check with black
      run: |
        black --check quiz login flashcard ai_chat courses Notes study_planner || true

    - name: Type check with mypy
      run: |
        mypy quiz login courses Notes study_planner --ignore-missing-imports || true

    - name: Run tests with coverage
      run: |
        pytest tests/ \
          --cov=ai_chat \
          --cov=quiz \
          --cov=flashcard \
          --cov=login \
          --cov=courses \
          --cov=Notes \
          --cov=study_planner \
          --cov-report=xml \
          --cov-report=term-missing \
          --asyncio-mode=auto
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella