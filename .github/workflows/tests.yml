name: Tests

on:
  push:
    branches: [ feature ]
  pull_request:
    branches: [ feature ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
        module:
          - { name: ai_chat,       src: ai_chat,       tests: tests/unit/ai_chat }
          - { name: courses,       src: courses,       tests: tests/unit/courses }
          - { name: flashcard,     src: flashcard,     tests: tests/unit/flashcard }
          - { name: quiz,          src: quiz,          tests: tests/unit/quiz }
          - { name: study_planner, src: study_planner, tests: tests/unit/study_planner }
          - { name: Notes,         src: Notes,         tests: tests/unit/Notes }
          - { name: login,         src: login,         tests: tests/unit/login }   # ← added
          - { name: subscription,  src: subscription,  tests: tests/unit/subscription }   # ← added
          - { name: cs_bot,        src: cs_bot,        tests: tests/unit/cs_bot }   # ← added

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir -r requirements-test.txt

    - name: Set environment
      run: |
        echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV
        echo "DATABASE_URL=sqlite+aiosqlite:///:memory:" >> $GITHUB_ENV
        echo "JWT_SECRET=fake-jwt-secret-for-testing" >> $GITHUB_ENV
        echo "JWT_SECRET_KEY=fake-jwt-secret-for-testing-32bytes!!" >> $GITHUB_ENV
        echo "JWT_ALGORITHM=HS256" >> $GITHUB_ENV
        echo "SECRET_KEY=fake-secret-key-for-testing" >> $GITHUB_ENV
        echo "GOOGLE_CLIENT_ID=fake-google-client-id.apps.googleusercontent.com" >> $GITHUB_ENV
        echo "GOOGLE_CLIENT_SECRET=fake-google-client-secret" >> $GITHUB_ENV
        echo "GEMINI_API_KEY=fake-gemini-api-key" >> $GITHUB_ENV
        echo "STRIPE_SECRET_KEY=fake-stripe-secret-key" >> $GITHUB_ENV
        echo "ACCESS_TOKEN_EXPIRE_MINUTES=30" >> $GITHUB_ENV
        echo "REFRESH_TOKEN_EXPIRE_DAYS=7" >> $GITHUB_ENV
        echo "RATE_LIMIT_REQUESTS=100" >> $GITHUB_ENV
        echo "FRONTEND_BASE_URL=http://localhost:3000" >> $GITHUB_ENV
        echo "SMTP_HOST=smtp.example.com" >> $GITHUB_ENV
        echo "SMTP_PORT=587" >> $GITHUB_ENV
        echo "SMTP_USER=test@example.com" >> $GITHUB_ENV
        echo "SMTP_USERNAME=test@example.com" >> $GITHUB_ENV
        echo "SMTP_PASSWORD=smtp-password" >> $GITHUB_ENV
        echo "EMAILS_FROM_EMAIL=noreply@example.com" >> $GITHUB_ENV
        echo "SMTP_FROM_EMAIL=noreply@example.com" >> $GITHUB_ENV
        echo "SMTP_FROM_NAME=EdHub360" >> $GITHUB_ENV

    - name: Lint — ${{ matrix.module.name }}
      run: |
        flake8 ${{ matrix.module.src }} \
          --count --select=E9,F63,F7,F82 \
          --show-source --statistics

    - name: Format check — ${{ matrix.module.name }}
      run: |
        black --check ${{ matrix.module.src }} || true

    - name: Type check — ${{ matrix.module.name }}
      run: |
        mypy ${{ matrix.module.src }} --ignore-missing-imports || true

    - name: Run tests — ${{ matrix.module.name }}
      run: |
        pytest ${{ matrix.module.tests }} \
          --cov=${{ matrix.module.src }} \
          --cov-report=xml:coverage_${{ matrix.module.name }}.xml \
          --cov-report=term-missing \
          --asyncio-mode=auto \
          -v --tb=short

    - name: Upload coverage — ${{ matrix.module.name }}
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage_${{ matrix.module.name }}.xml
        flags: ${{ matrix.module.name }}
        name: ${{ matrix.module.name }}
        fail_ci_if_error: false