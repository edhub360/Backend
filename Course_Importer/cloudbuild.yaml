steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/arctic-sentry-467317-s7/courses-repo/course-importer:${SHORT_SHA}-${BUILD_ID}'
      - './Course_Importer'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/arctic-sentry-467317-s7/courses-repo/course-importer:${SHORT_SHA}-${BUILD_ID}'

  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        export DATABASE_URL=$(gcloud secrets versions access latest --secret="DATABASE_URL")
        gcloud run deploy course-importer-service \
          --region=us-central1 \
          --image=us-central1-docker.pkg.dev/arctic-sentry-467317-s7/courses-repo/course-importer:${SHORT_SHA}-${BUILD_ID} \
          --platform=managed \
          --no-allow-unauthenticated \
          --port=8080 \
          --service-account=course-importer@arctic-sentry-467317-s7.iam.gserviceaccount.com \
          --set-env-vars=DATABASE_URL=$${DATABASE_URL},DRIVE_UPLOAD_FOLDER_ID=16b1jR4AvVWNV305yN1eVvJawaUcgayMa,IMPORTER_SERVICE_URL=https://course-importer-service-91248372939.us-central1.run.app,PAGE_DEFAULT_LIMIT=10,MAX_PAGE_LIMIT=100,LOG_LEVEL=INFO

options:
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET

images:
  - 'us-central1-docker.pkg.dev/arctic-sentry-467317-s7/courses-repo/course-importer:${SHORT_SHA}-${BUILD_ID}'